name: Step 4 # Test Generation

on:
  pull_request:
    branches:
      - main
    types:
      - closed
    paths:
      - "step-04-test-generation/**"

permissions:
  contents: read
  actions: write
  issues: write

env:
  STEP_5_FILE: ".github/steps/5-step.md"

jobs:
  find_exercise:
    name: Find Exercise Issue
    uses: skills/exercise-toolkit/.github/workflows/find-exercise-issue.yml@v0.8.1

  check_step_work:
    name: Check step work
    runs-on: ubuntu-latest
    needs: [find_exercise]
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Get response templates
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.8.1

      - name: Find last comment
        id: find-last-comment
        uses: peter-evans/find-comment@v3
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          direction: last

      - name: Update comment - checking work
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: exercise-toolkit/markdown-templates/step-feedback/checking-work.md
          edit-mode: replace

      - name: Check student_tests.py exists and has sufficient assertions
        id: check-student-tests
        continue-on-error: true
        run: |
          python3 - <<'EOF'
          import re
          from pathlib import Path
          import subprocess, sys

          test_file = Path("step-04-test-generation/student_tests.py")
          assert test_file.exists(), "Missing student_tests.py"

          content = test_file.read_text(encoding="utf-8")
          assert_count = len(re.findall(r"self\.assert", content))
          assert assert_count >= 6, \
              f"Expected at least 6 assertions in student_tests.py, found {assert_count}"

          lower_content = content.lower()
          for term in ["empty", "duplicate", "punctuation"]:
              assert term in lower_content, f"Expected test coverage for: {term}"

          result = subprocess.run(
              [sys.executable, str(test_file)],
              text=True, capture_output=True
          )
          assert result.returncode == 0, \
              "student_tests.py is failing:\n" + result.stdout + result.stderr

          print("Student tests check passed")
          EOF
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Check Copilot evidence file for Step 04
        id: check-evidence
        continue-on-error: true
        run: |
          python3 - <<'EOF'
          from pathlib import Path
          evidence_file = Path("step-04-test-generation/copilot-evidence.md")
          assert evidence_file.exists(), "Missing copilot-evidence.md"
          content = evidence_file.read_text(encoding="utf-8").lower()
          assert "<paste" not in content and "<short note" not in content, \
              "Evidence file still contains placeholders"
          assert "test" in content, "Missing evidence token: test"
          print("Evidence check passed")
          EOF
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Update comment - step results
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          edit-mode: replace
          file: exercise-toolkit/markdown-templates/step-feedback/step-results-table.md
          vars: |
            step_number: 4
            results_table:
              - description: "student_tests.py exists and has at least 6 assertions"
                passed: ${{ steps.check-student-tests.outcome == 'success' }}
              - description: "Tests cover empty input, duplicates, and punctuation edge cases"
                passed: ${{ steps.check-student-tests.outcome == 'success' }}
              - description: "All student tests pass"
                passed: ${{ steps.check-student-tests.outcome == 'success' }}
              - description: "Copilot evidence references test generation activity"
                passed: ${{ steps.check-evidence.outcome == 'success' }}

      - name: Fail job if not all checks passed
        if: contains(steps.*.outcome, 'failure')
        run: exit 1

  post_next_step_content:
    name: Post next step content
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get response templates
        uses: actions/checkout@v4
        with:
          repository: skills/exercise-toolkit
          path: exercise-toolkit
          ref: v0.8.1

      - name: Create comment - step finished
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/step-finished-prepare-next-step.md
          vars: |
            next_step_number: 5

      - name: Create comment - add step content
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_5_FILE }}
          vars: |
            login: ${{ github.actor }}
            full_repo_name: ${{ github.repository }}

      - name: Create comment - watching for progress
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: exercise-toolkit/markdown-templates/step-feedback/watching-for-progress.md

      - name: Disable current workflow and enable next one
        run: |
          gh workflow disable "${{ github.workflow }}"
          gh workflow enable "Step 5"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
